<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Index</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:20px;
}

button {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:15px;
}

/* CARD */
.card {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  position:relative;
  transition:.2s;
}

.card:hover {
  transform:scale(1.03);
}

/* HEADER */
.header {
  padding:6px 10px;
  border-radius:10px 10px 0 0;
  font-size:12px;
  font-weight:bold;
  text-align:center;
  margin:-12px -12px 10px -12px;
}

.header.low { background:rgba(59,130,246,0.2); color:#60a5fa; }
.header.mid { background:rgba(34,197,94,0.2); color:#4ade80; }
.header.high { background:rgba(234,179,8,0.25); color:#facc15; }
.header.hype { background:rgba(239,68,68,0.25); color:#f87171; }

/* TIERS */
.low { box-shadow:0 0 10px rgba(59,130,246,0.2); }
.mid { box-shadow:0 0 10px rgba(34,197,94,0.2); }
.high { box-shadow:0 0 10px rgba(234,179,8,0.2); }
.hype { box-shadow:0 0 20px rgba(239,68,68,0.4); }

/* STAR */
.star {
  position:absolute;
  top:8px;
  left:8px;
  cursor:pointer;
}

img {
  width:100%;
  border-radius:8px;
}

/* TOPBAR */
.topbar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input {
  padding:8px;
  border-radius:8px;
  border:none;
  width:100%;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Filters</h3>
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('rising')">⬆️ Rising</button>
  <button onclick="setFilter('high')">🔥 High</button>
  <button onclick="setFilter('hype')">🚨 Hype</button>
  <button onclick="setFilter('fav')">⭐ Favorites</button>
</div>

<div class="main">

<div class="topbar">
  <input id="search" placeholder="Search doodles...">
</div>

<div class="grid" id="grid"></div>

</div>

<!-- IMPORTANT: must load FIRST -->
<script src="data.js"></script>

<script>
let filterType = "all";
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");

/* SAFETY CHECK */
if (!window.doodles) {
  console.error("data.js not loaded or doodles is missing");
}

/* TIER */
function getTier(v){
  if(v <= 20) return "low";
  if(v <= 200) return "mid";
  if(v <= 1000) return "high";
  return "hype";
}

/* LABEL */
function getLabel(v){
  if(v <= 20) return "LOW DEMAND";
  if(v <= 200) return "MID DEMAND";
  if(v <= 1000) return "HIGH DEMAND";
  return "HYPE / OVERPAID";
}

/* TREND SAFE */
function trendIcon(t){
  if(t === "up") return "⬆️";
  if(t === "down") return "⬇️";
  return "➡️";
}

/* FAVORITE */
function toggleFav(name){
  if(favorites.includes(name)){
    favorites = favorites.filter(f => f !== name);
  } else {
    favorites.push(name);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
  render();
}

/* FILTER */
function setFilter(f){
  filterType = f;
  render();
}

/* RENDER (SAFE VERSION) */
function render(){
  const term = (document.getElementById("search").value || "").toLowerCase();
  grid.innerHTML = "";

  (window.doodles || []).forEach(d => {

    if(!d || !d.name) return;

    if(term && !d.name.toLowerCase().includes(term)) return;

    if(filterType === "rising" && d.trend !== "up") return;
    if(filterType === "high" && d.value < 200) return;
    if(filterType === "hype" && d.value < 1000) return;
    if(filterType === "fav" && !favorites.includes(d.name)) return;

    const tier = getTier(d.value || 0);
    const label = getLabel(d.value || 0);
    const trend = d.trend || "stable";

    const card = document.createElement("div");
    card.className = "card " + tier;

    card.innerHTML = `
      <div class="header ${tier}">${label}</div>

      <div class="star" onclick="toggleFav('${d.name}')">
        ${favorites.includes(d.name) ? "⭐" : "☆"}
      </div>

      <img src="${d.image || ''}"
      onerror="this.src='https://via.placeholder.com/200'">

      <h4>${d.name}</h4>
      <p>💰 ${d.value ?? 0}</p>
      <p>${trendIcon(trend)}</p>
    `;

    grid.appendChild(card);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", render);

render();
</script>

</body>
</html>
