<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Market</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#0f172a;
  font-family:Arial;
}

body {
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width:240px;
  min-width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  border-right:2px solid #1e293b;
}

.sidebar button {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  text-align:left;
  transition:0.2s;
  position:relative;
  overflow:hidden;
}

.sidebar button:hover {
  transform:translateX(6px);
  background:#334155;
}

.sidebar button.active {
  background:#334155;
  box-shadow:0 0 12px rgba(59,130,246,0.25);
  transform:translateX(6px);
}

/* animated shimmer sweep */
.sidebar button::after {
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  transform:skewX(-20deg);
}

.sidebar button:hover::after {
  left:120%;
  transition:0.5s;
}

/* ================= MAIN ================= */
.main {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* ================= GRID ================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* ================= CARD ================= */
.family-card {
  position:relative;
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  overflow:hidden;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}

.family-card:hover {
  transform:scale(1.04);
  z-index:10;
  box-shadow:0 12px 35px rgba(0,0,0,0.5);
}

/* ================= SHIMMER ================= */
.family-card::after {
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.06) 45%,
    rgba(255,255,255,0.14) 50%,
    rgba(255,255,255,0.06) 55%,
    transparent 100%
  );
  transform:skewX(-20deg);
  animation: shimmer 5s infinite;
  pointer-events:none;
}

@keyframes shimmer {
  0% { left:-120%; }
  100% { left:120%; }
}

/* ================= BORDER ================= */
.family-card::before {
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:14px;

  background:linear-gradient(135deg,#60a5fa,#1e3a8a);

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;

  pointer-events:none;
}

.family-card.low::before {
  background:linear-gradient(135deg,#60a5fa,#1e3a8a);
}

.family-card.mid::before {
  background:linear-gradient(135deg,#4ade80,#14532d);
}

.family-card.high::before {
  background:linear-gradient(135deg,#facc15,#92400e);
}

.family-card.hype::before {
  background:linear-gradient(270deg,#f87171,#fb7185,#f97316);
  background-size:400% 400%;
  animation:hypeBorder 3s ease infinite;
}

@keyframes hypeBorder {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* ================= GLOW ================= */
.glow-low { box-shadow:0 0 10px rgba(96,165,250,0.15); }
.glow-mid { box-shadow:0 0 14px rgba(74,222,128,0.18); }
.glow-high { box-shadow:0 0 18px rgba(250,204,21,0.22); }
.glow-hype { box-shadow:0 0 25px rgba(248,113,113,0.35); }

/* ================= HEADER ================= */
.family-header {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:white;
}

/* ================= BADGES ================= */
.badge {
  font-size:11px;
  padding:4px 10px;
  border-radius:999px;
  font-weight:bold;
}

.badge.low { background:rgba(96,165,250,0.15); color:#60a5fa; }
.badge.mid { background:rgba(74,222,128,0.15); color:#4ade80; }
.badge.high { background:rgba(250,204,21,0.15); color:#facc15; }
.badge.hype { background:rgba(248,113,113,0.15); color:#f87171; }

/* ================= IMAGE ================= */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* ================= EXPAND ================= */
.family-content {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.25s ease;
}

.family-card:hover .family-content {
  max-height:500px;
  opacity:1;
}

/* ================= FORMS ================= */
.forms {
  color:#93c5fd;
  margin-top:6px;
}

/* ================= VALUES ================= */
.values div {
  padding:2px 0;
  color:#e2e8f0;
}

.value-low { color:#f87171; }
.value-mid { color:#facc15; }
.value-high { color:#4ade80; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3 style="color:white;">Filters</h3>

  <button onclick="setFilter('all', this)" class="active">All</button>
  <button onclick="setFilter('rising', this)">Rising</button>
  <button onclick="setFilter('high', this)">High</button>
  <button onclick="setFilter('hype', this)">Hype</button>

  <hr style="border:1px solid #1e293b; margin:12px 0;">

  <button onclick="sortAZ()">Sort: A → Z</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

let activeFilter = "all";
let activeBtn = null;

/* FILTER */
function setFilter(f, btn){
  activeFilter = f;
  render();

  if(activeBtn) activeBtn.classList.remove("active");
  if(btn){
    btn.classList.add("active");
    activeBtn = btn;
  }
}

/* SORT A-Z ONLY */
function sortAZ(){
  doodles.sort((a,b) => a.name.localeCompare(b.name));
  render();
}

/* COLOR */
function getColor(v){
  if(v <= 5) return "value-low";
  if(v <= 10) return "value-mid";
  return "value-high";
}

/* RENDER */
function render(){
  grid.innerHTML = "";

  let list = [...doodles];

  /* FILTER */
  list = list.filter(d => {
    const v = d.values.UHT6;

    if(activeFilter === "rising") return d.trend === "up";
    if(activeFilter === "high") return v > 10 && v <= 15;
    if(activeFilter === "hype") return v > 15;

    return true;
  });

  list.forEach(d => {

    const v = d.values.UHT6;

    let tier = "low";
    let badgeText = "LOW DEMAND";

    if (v <= 5) {
      tier = "low";
      badgeText = "LOW DEMAND";
    } else if (v <= 10) {
      tier = "mid";
      badgeText = "MID DEMAND";
    } else if (v <= 15) {
      tier = "high";
      badgeText = "HIGH DEMAND";
    } else {
      tier = "hype";
      badgeText = "HYPE DEMAND";
    }

    let glow = "glow-low";
    if (v > 5) glow = "glow-mid";
    if (v > 10) glow = "glow-high";
    if (v > 15) glow = "glow-hype";

    if (d.trend === "up") {
      if (glow === "glow-low") glow = "glow-mid";
      else if (glow === "glow-mid") glow = "glow-high";
      else glow = "glow-hype";
    }

    const card = document.createElement("div");
    card.className = `family-card ${tier} ${glow}`;

    card.innerHTML = `
      <div class="family-header">
        <div>${d.name}
          <span style="margin-left:6px; font-size:11px; opacity:0.7;">
            ${d.trend.toUpperCase()}
          </span>
        </div>
        <div class="badge ${tier}">${badgeText}</div>
      </div>

      <img src="${d.image}">

      <div class="family-content">
        <div class="forms">
          ${d.forms.join(" → ")}
        </div>

        <div class="values">
          ${Object.entries(d.values).map(([k,v]) => `
            <div class="${getColor(v)}">${k}: ${v}</div>
          `).join("")}
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
