<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Market</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#0f172a;
  font-family:Arial;
}

body {
  display:flex;
}

/* ================= TOGGLE BUTTON ================= */
#toggleSidebarBtn {
  position:fixed;
  top:15px;
  left:15px;
  z-index:9999;
  padding:10px 12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition: transform 0.3s ease, background 0.2s ease;
}

#toggleSidebarBtn:hover {
  background:#334155;
}

/* ================= SIDEBAR (FIXED) ================= */
.sidebar {
  width:240px;
  min-width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  border-right:2px solid #1e293b;

  transition: transform 0.3s ease;
  transform: translateX(0);

  position: relative;
  z-index: 20;
}

.sidebar.hidden {
  transform: translateX(-100%);
  pointer-events: none;
}

/* ================= MOBILE FIX ================= */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 30;
  }

  .main {
    width: 100%;
  }
}

/* ================= TITLE ================= */
.sidebar h2 {
  color:white;
  margin-bottom:14px;
  font-size:16px;
  letter-spacing:0.5px;
  line-height:1.2;
}

/* ================= PREMIUM BUTTONS ================= */
.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:12px 14px;
  border:none;
  border-radius:12px;

  background:linear-gradient(145deg,#1e293b,#111827);
  color:#e2e8f0;

  cursor:pointer;
  text-align:left;

  font-size:14px;
  font-weight:600;
  letter-spacing:0.3px;

  transition: all 0.25s ease;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 6px 18px rgba(0,0,0,0.25);
}

.sidebar button:hover {
  transform:translateX(6px) scale(1.02);
  background:linear-gradient(145deg,#334155,#1e293b);
  box-shadow:
    0 10px 25px rgba(0,0,0,0.4),
    0 0 12px rgba(59,130,246,0.15);
}

.sidebar button.active {
  background:linear-gradient(145deg,#334155,#1e293b);
  box-shadow:
    0 0 14px rgba(59,130,246,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.08);
  transform:translateX(6px);
}

/* ================= MAIN ================= */
.main {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* ================= GRID ================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* ================= CARD ================= */
.family-card {
  position:relative;
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  overflow:hidden;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}

.family-card:hover {
  transform:scale(1.04);
  z-index:10;
  box-shadow:0 12px 35px rgba(0,0,0,0.5);
}

/* ================= SHIMMER ================= */
.family-card::after {
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.06) 45%,
    rgba(255,255,255,0.14) 50%,
    rgba(255,255,255,0.06) 55%,
    transparent 100%
  );
  transform:skewX(-20deg);
  animation: shimmer 5s infinite;
  pointer-events:none;
}

@keyframes shimmer {
  0% { left:-120%; }
  100% { left:120%; }
}

/* ================= BORDER SYSTEM ================= */
.family-card::before {
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:14px;
  pointer-events:none;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

/* LOW */
.family-card.low::before {
  background:linear-gradient(135deg,#60a5fa,#1e3a8a);
}

/* MID */
.family-card.mid::before {
  background:linear-gradient(135deg,#4ade80,#14532d);
}

/* HIGH */
.family-card.high::before {
  background:linear-gradient(135deg,#facc15,#92400e);
}

/* HYPE */
.family-card.hype::before {
  background:linear-gradient(270deg,#f87171,#fb7185,#f97316);
  background-size:400% 400%;
  animation:hypeBorder 3s ease infinite;
}

@keyframes hypeBorder {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* ================= GLOW ================= */
.glow-low { box-shadow:0 0 10px rgba(96,165,250,0.15); }
.glow-mid { box-shadow:0 0 14px rgba(74,222,128,0.18); }
.glow-high { box-shadow:0 0 18px rgba(250,204,21,0.22); }
.glow-hype { box-shadow:0 0 25px rgba(248,113,113,0.35); }

/* ================= HEADER ================= */
.family-header {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:white;
}

/* ================= BADGES ================= */
.badge {
  font-size:11px;
  padding:4px 10px;
  border-radius:999px;
  font-weight:bold;
}

.badge.low {
  background:rgba(96,165,250,0.15);
  color:#60a5fa;
}

.badge.mid {
  background:rgba(74,222,128,0.15);
  color:#4ade80;
}

.badge.high {
  background:rgba(250,204,21,0.15);
  color:#facc15;
}

.badge.hype {
  background:rgba(248,113,113,0.15);
  color:#f87171;
  animation:badgePulse 1.5s infinite;
}

@keyframes badgePulse {
  0% { box-shadow:0 0 0 rgba(248,113,113,0); }
  50% { box-shadow:0 0 14px rgba(248,113,113,0.7); }
  100% { box-shadow:0 0 0 rgba(248,113,113,0); }
}

/* ================= IMAGE ================= */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* ================= EXPAND ================= */
.family-content {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.25s ease;
}

.family-card:hover .family-content {
  max-height:500px;
  opacity:1;
}

/* ================= FORMS ================= */
.forms {
  color:#93c5fd;
  margin-top:6px;
}

/* ================= VALUES ================= */
.values div {
  padding:2px 0;
  color:#e2e8f0;
}

.value-low { color:#f87171; }
.value-mid { color:#facc15; }
.value-high { color:#4ade80; }
</style>
</head>

<body>

<button id="toggleSidebarBtn" onclick="toggleSidebar()">☰</button>

<div class="sidebar">
  <h2>
    Doodle World Value Index<br>
    <span style="opacity:0.6; font-size:12px;">by janitoess</span>
  </h2>

  <button class="active">All</button>
  <button>Rising</button>
  <button>High</button>
  <button>Hype</button>

  <hr style="border:1px solid #1e293b; margin:12px 0;">

  <button>Sort: A → Z</button>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

let sidebarOpen = true;

function toggleSidebar(){
  const sidebar = document.querySelector(".sidebar");
  const btn = document.getElementById("toggleSidebarBtn");

  sidebarOpen = !sidebarOpen;

  if(sidebarOpen){
    sidebar.classList.remove("hidden");
    btn.innerHTML = "☰";
    btn.style.transform = "rotate(0deg)";
  } else {
    sidebar.classList.add("hidden");
    btn.innerHTML = "✖";
    btn.style.transform = "rotate(180deg)";
  }
}

function render(){
  grid.innerHTML = "";

  doodles.forEach(d => {

    const v = d.values.UHT6;

    let tier = "low";
    let badgeText = "LOW DEMAND";

    if (v <= 5) tier = "low";
    else if (v <= 10) { tier = "mid"; badgeText = "MID DEMAND"; }
    else if (v <= 15) { tier = "high"; badgeText = "HIGH DEMAND"; }
    else { tier = "hype"; badgeText = "HYPE DEMAND"; }

    const card = document.createElement("div");
    card.className = `family-card ${tier}`;

    card.innerHTML = `
      <div class="family-header">
        <div>${d.name}</div>
        <div class="badge ${tier}">${badgeText}</div>
      </div>

      <img src="${d.image}">

      <div class="family-content">
        <div class="forms">
          ${d.forms.join(" → ")}
        </div>

        <div class="values">
          ${Object.entries(d.values).map(([k,v]) => `
            <div>${k}: ${v}</div>
          `).join("")}
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
