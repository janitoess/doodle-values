<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Market</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#0f172a;
  font-family:Arial;
}

body {
  display:flex;
}

/* ================= TOGGLE ================= */
#toggleSidebarBtn {
  position:fixed;
  top:15px;
  left:15px;
  z-index:9999;
  padding:10px 12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width:240px;
  min-width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  border-right:2px solid #1e293b;
  transition: transform 0.3s ease;
  transform: translateX(0);
  position: relative;
  z-index:20;
}

.sidebar.hidden {
  transform: translateX(-100%);
  pointer-events:none;
}

/* ================= TITLE ================= */
.sidebar h2 {
  color:white;
  margin-bottom:14px;
  font-size:16px;
  line-height:1.2;
}

/* ================= SEARCH ================= */
.sidebar input {
  width:100%;
  padding:10px 12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
  box-shadow: inset 0 0 0 1px #1e293b;
}

/* ================= BUTTONS ================= */
.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(145deg,#1e293b,#111827);
  color:#e2e8f0;
  cursor:pointer;
  text-align:left;
}

/* ================= MAIN ================= */
.main {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* ================= GRID ================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* ================= CARD ================= */
.family-card {
  position:relative;
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  overflow:hidden;
  transition:0.25s;
}

.family-card:hover {
  transform:scale(1.04);
}

/* ================= BORDER ================= */
.family-card::before {
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:14px;
  pointer-events:none;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

.low::before { background:linear-gradient(135deg,#60a5fa,#1e3a8a); }
.mid::before { background:linear-gradient(135deg,#4ade80,#14532d); }
.high::before { background:linear-gradient(135deg,#facc15,#92400e); }
.hype::before {
  background:linear-gradient(270deg,#f87171,#fb7185,#f97316);
  background-size:400% 400%;
  animation:hypeBorder 3s ease infinite;
}

@keyframes hypeBorder {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* ================= BADGES ================= */
.badge {
  font-size:11px;
  padding:4px 10px;
  border-radius:999px;
  font-weight:bold;
}

.badge.low { background:rgba(96,165,250,0.15); color:#60a5fa; }
.badge.mid { background:rgba(74,222,128,0.15); color:#4ade80; }
.badge.high { background:rgba(250,204,21,0.15); color:#facc15; }
.badge.hype { background:rgba(248,113,113,0.15); color:#f87171; }

/* ================= HEADER ================= */
.family-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
  color:white;
}

/* ================= TREND INDICATOR ================= */
.trend {
  margin-left:8px;
  font-size:12px;
  opacity:0.9;
}

.trend.up { color:#4ade80; }
.trend.down { color:#f87171; }
.trend.stable { color:#94a3b8; }

/* ================= IMAGE ================= */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* ================= EXPAND ================= */
.family-content {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.25s ease;
}

.family-card:hover .family-content {
  max-height:500px;
  opacity:1;
}

/* ================= VALUES ================= */
.values div {
  padding:2px 0;
  color:#e2e8f0;
}

.forms {
  color:#93c5fd;
  margin-top:6px;
}
</style>
</head>

<body>

<button id="toggleSidebarBtn" onclick="toggleSidebar()">☰</button>

<div class="sidebar">
  <h2>
    Doodle World Value Index<br>
    <span style="opacity:0.6; font-size:12px;">by janitoess</span>
  </h2>

  <input id="searchInput" placeholder="🔍 Search doodles..." />

  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('rising')">Rising</button>
  <button onclick="setFilter('high')">High</button>
  <button onclick="setFilter('hype')">Hype</button>

  <hr style="border:1px solid #1e293b; margin:12px 0;">

  <button onclick="sortAZ()">Sort: A → Z</button>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

let searchQuery = "";
let activeFilter = "all";

/* TOGGLE */
function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("hidden");
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

/* FILTER */
function setFilter(f){
  activeFilter = f;
  render();
}

/* SORT */
function sortAZ(){
  doodles.sort((a,b) => a.name.localeCompare(b.name));
  render();
}

/* TREND ICON */
function getTrendIcon(trend){
  if(trend === "up") return "↑";
  if(trend === "down") return "↓";
  return "→";
}

/* RENDER */
function render(){
  grid.innerHTML = "";

  let list = [...doodles];

  // FILTER
  list = list.filter(d => {
    const v = d.values.UHT6;

    if(activeFilter === "rising") return d.trend === "up";
    if(activeFilter === "high") return v > 10 && v <= 15;
    if(activeFilter === "hype") return v > 15;

    return true;
  });

  // SEARCH
  if(searchQuery){
    list = list.filter(d =>
      d.name.toLowerCase().includes(searchQuery) ||
      d.forms.join(" ").toLowerCase().includes(searchQuery)
    );
  }

  // SORT
  list.sort((a,b) => a.name.localeCompare(b.name));

  // RENDER
  list.forEach(d => {

    const v = d.values.UHT6;

    let tier = "low";
    let badgeText = "LOW DEMAND";

    if (v <= 5) { tier = "low"; }
    else if (v <= 10) { tier = "mid"; badgeText = "MID DEMAND"; }
    else if (v <= 15) { tier = "high"; badgeText = "HIGH DEMAND"; }
    else { tier = "hype"; badgeText = "HYPE DEMAND"; }

    const card = document.createElement("div");
    card.className = `family-card ${tier}`;

    card.innerHTML = `
      <div class="family-header">
        <div>
          ${d.name}
          <span class="trend ${d.trend}">
            ${getTrendIcon(d.trend)}
          </span>
        </div>

        <div class="badge ${tier}">${badgeText}</div>
      </div>

      <img src="${d.image}">

      <div class="family-content">
        <div class="forms">${d.forms.join(" → ")}</div>

        <div class="values">
          ${Object.entries(d.values).map(([k,v]) =>
            `<div>${k}: ${v}</div>`
          ).join("")}
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
