<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Market</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#0f172a;
  font-family:Arial;
}

/* layout */
body {
  display:flex;
}

/* sidebar */
.sidebar {
  width:240px;
  min-width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  border-right:2px solid #1e293b;
}

.sidebar button {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  text-align:left;
}

/* main */
.main {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* card */
.family-card {
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  position:relative;
}

/* header */
.family-header {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:white;
}

/* image */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* expand */
.family-content {
  max-height:0;
  overflow:hidden;
  transition:0.3s;
  opacity:0;
}

.family-card.open .family-content {
  max-height:500px;
  opacity:1;
}

/* forms */
.forms {
  color:#93c5fd;
  margin-top:6px;
}

/* ================= VALUE COLORS ================= */
.values div {
  padding:2px 0;
  transition:0.2s;
  color:#e2e8f0;
}

.value-low {
  color:#f87171;
}

.value-mid {
  color:#facc15;
}

.value-high {
  color:#4ade80;
}

.values div:hover {
  color:#ffffff;
  transform:translateX(2px);
}
</style>
</head>

<body>

<div class="sidebar">
  <h3 style="color:white;">Filters</h3>
  <button>All</button>
  <button>Rising</button>
  <button>High</button>
  <button>Hype</button>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

function getColor(v){
  if(v <= 5) return "value-low";
  if(v <= 10) return "value-mid";
  return "value-high";
}

function render(){
  grid.innerHTML = "";

  doodles.forEach(d => {

    const card = document.createElement("div");
    card.className = "family-card";

    card.innerHTML = `
      <div class="family-header">
        <div>${d.name}</div>
      </div>

      <img src="${d.image}" onerror="this.src='https://via.placeholder.com/200'">

      <div class="family-content">
        <div class="forms">
          ${d.forms.join(" → ")}
        </div>

        <div class="values">
          ${Object.entries(d.values).map(([k,v]) => `
            <div class="${getColor(v)}">${k}: ${v}</div>
          `).join("")}
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
