<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Index</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:20px;
}

button {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:15px;
}

/* CARD */
.card {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  position:relative;
  transition:.2s;
}

.card:hover { transform:scale(1.03); }

/* TIERS */
.low { box-shadow:0 0 10px rgba(59,130,246,0.2); }
.mid { box-shadow:0 0 10px rgba(34,197,94,0.2); }
.high { box-shadow:0 0 10px rgba(234,179,8,0.2); }
.hype { box-shadow:0 0 20px rgba(239,68,68,0.4); }

/* FAVORITE */
.star {
  position:absolute;
  top:8px;
  left:8px;
  cursor:pointer;
}

/* TOP BAR */
.topbar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input {
  padding:8px;
  border-radius:8px;
  border:none;
}

/* TRADE BOX */
.trade {
  margin-top:20px;
  padding:15px;
  background:#020617;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Filters</h3>
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('rising')">⬆️ Rising</button>
  <button onclick="setFilter('high')">🔥 High Demand</button>
  <button onclick="setFilter('hype')">🚨 Hype</button>
  <button onclick="setFilter('fav')">⭐ Favorites</button>
</div>

<div class="main">

<div class="topbar">
  <input id="search" placeholder="Search...">
</div>

<div class="grid" id="grid"></div>

<div class="trade">
  <h3>Trade Calculator</h3>
  <input id="d1" placeholder="Doodle 1">
  <input id="d2" placeholder="Doodle 2">
  <button onclick="compare()">Compare</button>
  <p id="result"></p>
</div>

</div>

<script src="data.js"></script>

<script>
let filterType = "all";
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");

/* SYSTEMS */
function getTier(v){
  if(v<=20) return "low";
  if(v<=200) return "mid";
  if(v<=1000) return "high";
  return "hype";
}

function trendIcon(t){
  if(t==="up") return "⬆️";
  if(t==="down") return "⬇️";
  return "➡️";
}

/* LIVE VALUE MOVEMENT */
function fluctuate(){
  doodles.forEach(d=>{
    let change = Math.floor(Math.random()*3)-1;
    d.value = Math.max(1, d.value + change);
  });
  render();
}
setInterval(fluctuate, 4000);

/* FAVORITES */
function toggleFav(name){
  if(favorites.includes(name)){
    favorites = favorites.filter(f=>f!==name);
  } else {
    favorites.push(name);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
  render();
}

/* RENDER */
function render(){
  const term = document.getElementById("search").value.toLowerCase();

  grid.innerHTML="";

  doodles.forEach(d=>{
    if(term && !d.name.toLowerCase().includes(term)) return;

    if(filterType==="rising" && d.trend!=="up") return;
    if(filterType==="high" && d.value<200) return;
    if(filterType==="hype" && d.value<1000) return;
    if(filterType==="fav" && !favorites.includes(d.name)) return;

    const card=document.createElement("div");
    card.className="card "+getTier(d.value);

    card.innerHTML=`
      <div class="star" onclick="toggleFav('${d.name}')">
        ${favorites.includes(d.name) ? "⭐" : "☆"}
      </div>

      <img src="${d.image}" 
      onerror="this.src='https://via.placeholder.com/200'">

      <h4>${d.name}</h4>
      <p>💰 ${d.value}</p>
      <p>${trendIcon(d.trend)}</p>
    `;

    grid.appendChild(card);
  });
}

/* FILTER */
function setFilter(f){
  filterType=f;
  render();
}

/* TRADE CALCULATOR */
function compare(){
  const a = doodles.find(d=>d.name.toLowerCase().includes(document.getElementById("d1").value.toLowerCase()));
  const b = doodles.find(d=>d.name.toLowerCase().includes(document.getElementById("d2").value.toLowerCase()));

  if(!a || !b){
    document.getElementById("result").innerText="Invalid input";
    return;
  }

  let diff = a.value - b.value;

  if(Math.abs(diff) <= 5) return result("Fair Trade");
  if(diff > 5) return result("Win");
  return result("Loss");
}

function result(text){
  document.getElementById("result").innerText=text;
}

/* INIT */
document.getElementById("search").addEventListener("input", render);

render();
</script>

</body>
</html>
