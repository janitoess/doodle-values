<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doodle World Values</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Inter, sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  height:100vh;
  overflow:hidden;
}

.sidebar {
  width:220px;
  background:rgba(15,23,42,0.95);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.logo { font-size:20px; font-weight:700; margin-bottom:20px; }

.nav button {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:transparent;
  border:none;
  color:#94a3b8;
  text-align:left;
  border-radius:10px;
  cursor:pointer;
}

.nav button:hover,
.nav button.active {
  background:#1e293b;
  color:white;
}

.main {
  flex:1;
  padding:25px;
  overflow-y:auto;
}

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

input {
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  color:white;
  width:220px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
  transition:0.25s;
  opacity:0;
  transform:translateY(10px);
  animation:fadeUp 0.4s forwards;
}

.card:hover {
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}

img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

.value {
  font-size:20px;
  font-weight:600;
  margin-top:8px;
}

.evo {
  font-size:12px;
  opacity:0.7;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Doodle Values</div>

  <div class="nav">
    <button class="active" onclick="showAll(this)">All Doodles</button>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <h2>Doodle World Values</h2>
    <input id="search" placeholder="Search doodles..."/>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>

const data = [
  {
    name: "Beetle Line",
    value: 10,
    image: "https://static.wikia.nocookie.net/doodle-world/images/beetle.png",
    forms: ["Beetle", "Beetle Evo"]
  },
  {
    name: "Fly Line",
    value: 10,
    image: "https://static.wikia.nocookie.net/doodle-world/images/fly.png",
    forms: ["Fly", "Fly Evo"]
  },
  {
    name: "Chronos Line",
    value: 2500,
    image: "https://static.wikia.nocookie.net/doodle-world/images/chronos.png",
    forms: ["Chronos"]
  }
];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(items) {
  grid.innerHTML = "";

  items.forEach((item,i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = i * 0.05 + "s";

    card.innerHTML = `
      <img src="${item.image}" />
      <h2>${item.name}</h2>
      <div class="value">${item.value}</div>
      <div class="evo">Forms: ${item.forms.join(", ")}</div>
    `;

    grid.appendChild(card);
  });
}

search.addEventListener("input", () => {
  const term = search.value.toLowerCase();

  const filtered = data.filter(d =>
    d.name.toLowerCase().includes(term) ||
    d.forms.some(f => f.toLowerCase().includes(term))
  );

  render(filtered);
});

function showAll(btn) {
  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render(data);
}

render(data);

</script>

</body>
</html>
