<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doodle Values</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  background: #0b1220;
  padding: 20px;
  border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar h2 {
  margin-bottom: 20px;
}

.group-btn {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 10px;
  background: #111827;
  color: #94a3b8;
  cursor: pointer;
  text-align: left;
  transition: 0.2s;
}

.group-btn:hover,
.group-btn.active {
  background: #1e293b;
  color: white;
}

.main {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
  width: 220px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.value {
  font-size: 18px;
  font-weight: 600;
  margin-top: 5px;
}

.forms {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

.tag {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Doodle Values</h2>

  <button class="group-btn active" onclick="setGroup('all', this)">All</button>
  <button class="group-btn" onclick="setGroup('Swarms', this)">Swarms</button>
  <button class="group-btn" onclick="setGroup('Mythics', this)">Mythics</button>
  <button class="group-btn" onclick="setGroup('Event Exclusive', this)">Event Exclusive</button>
  <button class="group-btn" onclick="setGroup('Other', this)">Other</button>  
  <button class="group-btn" onclick="setGroup('Runic', this)">Runic</button>
  <button class="group-btn" onclick="setGroup('Dungeon', this)">Dungeon</button>
</div>

<div class="main">

  <div class="topbar">
    <h2 id="title">All Doodles</h2>
    <input id="search" placeholder="Search doodles..." />
  </div>

  <div class="grid" id="grid"></div>

</div>

<script src="data.js"></script>

<script>
let activeGroup = "all";

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const title = document.getElementById("title");

function render(list) {
  grid.innerHTML = "";

  list.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (i * 0.03) + "s";

    card.innerHTML = `
      <img src="${d.image}" onerror="this.src='https://via.placeholder.com/300x180?text=Doodle+Image'" />
      <h3>${d.name}</h3>
      <div class="value">Value: ${d.value}</div>
      <div class="forms">Forms: ${d.forms.join(", ")}</div>
      <div class="tag">${d.group}</div>
    `;

    grid.appendChild(card);
  });
}

function filter() {
  const term = search.value.toLowerCase();

  const filtered = doodles.filter(d => {
    const matchGroup = activeGroup === "all" || d.group === activeGroup;

    const matchSearch =
      d.name.toLowerCase().includes(term) ||
      d.forms.some(f => f.toLowerCase().includes(term));

    return matchGroup && matchSearch;
  });

  render(filtered);
}

function setGroup(group, el) {
  activeGroup = group;

  document.querySelectorAll(".group-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  title.innerText = group === "all" ? "All Doodles" : group;

  filter();
}

search.addEventListener("input", filter);

render(doodles);
</script>

</body>
</html>
