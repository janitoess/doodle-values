<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Market</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#0f172a;
  font-family:Arial;
}

body {
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width:240px;
  min-width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
  border-right:2px solid #1e293b;
}

.sidebar button {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  text-align:left;
}

/* ================= MAIN ================= */
.main {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* ================= GRID ================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* ================= CARD ================= */
.family-card {
  position:relative;
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  overflow:hidden;
}

/* ================= SHIMMER ================= */
.family-card::after {
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.06) 45%,
    rgba(255,255,255,0.14) 50%,
    rgba(255,255,255,0.06) 55%,
    transparent 100%
  );
  transform:skewX(-20deg);
  animation: shimmer 5s infinite;
  pointer-events:none;
}

@keyframes shimmer {
  0% { left:-120%; }
  100% { left:120%; }
}

/* ================= RARITY BORDERS ================= */
.family-card::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  padding:2px;
  z-index:0;
}

/* LOW */
.family-card.low::before {
  background:linear-gradient(135deg,#60a5fa,#1e3a8a);
}

/* MID */
.family-card.mid::before {
  background:linear-gradient(135deg,#4ade80,#14532d);
}

/* HIGH */
.family-card.high::before {
  background:linear-gradient(135deg,#facc15,#92400e);
}

/* HYPE */
.family-card.hype::before {
  background:linear-gradient(270deg,#f87171,#fb7185,#f97316);
  background-size:400% 400%;
  animation:hypeBorder 3s ease infinite;
}

@keyframes hypeBorder {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* ================= HEADER ================= */
.family-header {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:white;
}

/* ================= IMAGE ================= */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* ================= EXPAND ================= */
.family-content {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.3s ease;
}

.family-card.open .family-content {
  max-height:500px;
  opacity:1;
}

.forms {
  color:#93c5fd;
  margin-top:6px;
}

/* ================= VALUE COLORS ================= */
.values div {
  padding:2px 0;
  transition:0.2s;
  color:#e2e8f0;
}

.value-low { color:#f87171; }
.value-mid { color:#facc15; }
.value-high { color:#4ade80; }

.values div:hover {
  color:#ffffff;
  transform:translateX(2px);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3 style="color:white;">Filters</h3>
  <button>All</button>
  <button>Rising</button>
  <button>High</button>
  <button>Hype</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

function getColor(v){
  if(v <= 5) return "value-low";
  if(v <= 10) return "value-mid";
  return "value-high";
}

function render(){
  grid.innerHTML = "";

  doodles.forEach(d => {

    const v = d.values.UHT6;

    let tier = "low";
    if (v <= 5) tier = "low";
    else if (v <= 10) tier = "mid";
    else if (v <= 15) tier = "high";
    else tier = "hype";

    const card = document.createElement("div");
    card.className = `family-card ${tier}`;

    card.innerHTML = `
      <div class="family-header">
        <div>${d.name}</div>
      </div>

      <img src="${d.image}" onerror="this.src='https://via.placeholder.com/200'">

      <div class="family-content">
        <div class="forms">
          ${d.forms.join(" → ")}
        </div>

        <div class="values">
          ${Object.entries(d.values).map(([k,v]) => `
            <div class="${getColor(v)}">${k}: ${v}</div>
          `).join("")}
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
