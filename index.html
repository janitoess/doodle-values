<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Market</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:20px;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* FAMILY CARD */
.family-card {
  position:relative;
  border-radius:14px;
  padding:12px;
  background:#1e293b;
  cursor:pointer;
  overflow:hidden;
  transition:0.2s;
}

.family-card:hover {
  transform:scale(1.02);
}

/* SHIMMER */
.family-card::after {
  content:"";
  position:absolute;
  top:0;
  left:-150%;
  width:80%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.05) 40%,
    rgba(255,255,255,0.12) 50%,
    rgba(255,255,255,0.05) 60%,
    transparent 100%
  );
  transform:skewX(-20deg);
  animation: shimmerMove 4s infinite;
  pointer-events:none;
}

@keyframes shimmerMove {
  0% { left:-150%; }
  100% { left:150%; }
}

/* BORDER GRADIENTS */
.family-card.low::before,
.family-card.mid::before,
.family-card.high::before,
.family-card.hype::before {
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:14px;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

.family-card.low::before { background:linear-gradient(135deg,#60a5fa,#1e3a8a); }
.family-card.mid::before { background:linear-gradient(135deg,#4ade80,#14532d); }
.family-card.high::before { background:linear-gradient(135deg,#facc15,#92400e); }

.family-card.hype::before {
  background:linear-gradient(270deg,#f87171,#fb7185,#f97316);
  background-size:400% 400%;
  animation:hypeBorder 3s ease infinite;
}

@keyframes hypeBorder {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* HEADER */
.family-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

/* BADGE */
.badge {
  font-size:11px;
  padding:4px 10px;
  border-radius:999px;
}

.badge.low { color:#60a5fa; background:rgba(96,165,250,0.15); }
.badge.mid { color:#4ade80; background:rgba(74,222,128,0.15); }
.badge.high { color:#facc15; background:rgba(250,204,21,0.15); }
.badge.hype {
  color:#f87171;
  background:rgba(248,113,113,0.15);
  animation: badgePulse 1.6s infinite;
}

@keyframes badgePulse {
  0% { box-shadow:0 0 0 rgba(248,113,113,0); }
  50% { box-shadow:0 0 12px rgba(248,113,113,0.6); }
  100% { box-shadow:0 0 0 rgba(248,113,113,0); }
}

/* IMAGE */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* CONTENT */
.family-content {
  max-height:0;
  opacity:0;
  overflow:hidden;
  transform:translateY(-5px);
  transition:0.25s ease;
}

.family-card.open .family-content {
  max-height:500px;
  opacity:1;
  transform:translateY(0);
}

.family-card:hover .family-content {
  max-height:500px;
  opacity:0.9;
  transform:translateY(0);
}

.forms {
  margin-top:6px;
  color:#93c5fd;
}

.values div {
  padding:2px 0;
}
</style>
</head>

<body>

<div class="sidebar"></div>

<div class="main">
<div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

/* BADGE LOGIC */
function getBadge(d){
  const v = d.values.UHT6;
  if(v <= 5) return { label:"LOW DEMAND", tier:"low" };
  if(v <= 10) return { label:"MID DEMAND", tier:"mid" };
  if(v <= 15) return { label:"HIGH DEMAND", tier:"high" };
  return { label:"🔥 HYPE / HOT", tier:"hype" };
}

/* TOGGLE */
function toggle(card){
  card.classList.toggle("open");
}

/* RENDER */
function render(){
  grid.innerHTML = "";

  doodles.forEach(d => {
    const badge = getBadge(d);

    const card = document.createElement("div");
    card.className = `family-card ${badge.tier}`;

    card.innerHTML = `
      <div class="family-header">
        <div>${d.name}</div>
        <div class="badge ${badge.tier}">${badge.label}</div>
      </div>

      <img src="${d.image}" onerror="this.src='https://via.placeholder.com/200'">

      <div class="family-content">
        <div class="forms">
          ${d.forms.join(" → ")}
        </div>

        <div class="values">
          ${Object.entries(d.values).map(([k,v]) => `<div>${k}: ${v}</div>`).join("")}
        </div>
      </div>
    `;

    card.addEventListener("click", () => toggle(card));

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
