<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Value Families</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  text-align:left;
  transition:0.2s;
}

.sidebar button:hover {
  transform:translateX(3px);
}

.sidebar button.active {
  background:#334155;
  border-left:3px solid #60a5fa;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
}

/* FAMILY CARD */
.family-card {
  background:#1e293b;
  border-radius:12px;
  padding:12px;
  cursor:pointer;
  transition:0.2s;
}

.family-card:hover {
  transform:scale(1.02);
}

.family-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

/* IMAGE */
img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

/* COLLAPSE */
.family-content {
  display:none;
  margin-top:10px;
  font-size:13px;
  opacity:0.9;
}

.family-card.open .family-content {
  display:block;
}

.forms {
  margin-top:6px;
  color:#93c5fd;
}

.values div {
  padding:2px 0;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Filters</h3>
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('rising')">Rising</button>
<button onclick="setFilter('high')">High Demand</button>
<button onclick="setFilter('hype')">Hype</button>
</div>

<div class="main">
<div class="grid" id="grid"></div>
</div>

<script src="data.js"></script>

<script>
let activeFilter = "all";
const grid = document.getElementById("grid");

/* TOGGLE FAMILY */
function toggleFamily(card){
  card.classList.toggle("open");
}

/* FILTER */
function setFilter(f){
  activeFilter = f;
  render();
}

/* RENDER */
function render(){
  grid.innerHTML = "";

  doodles.forEach(d => {

    if(activeFilter === "rising" && d.trend !== "up") return;
    if(activeFilter === "high" && d.values.UHT6 < 10) return;
    if(activeFilter === "hype" && d.values.UHT6 < 15) return;

    const card = document.createElement("div");
    card.className = "family-card";

    card.innerHTML = `
      <div class="family-header">
        <div>${d.name}</div>
        <div>▼</div>
      </div>

      <img src="${d.image}" onerror="this.src='https://via.placeholder.com/200'">

      <div class="family-content">
        <div class="forms">
          Forms: ${d.forms.join(" → ")}
        </div>

        <div class="values">
          ${Object.entries(d.values)
            .map(([k,v]) => `<div>${k}: ${v}</div>`)
            .join("")}
        </div>
      </div>
    `;

    card.addEventListener("click", () => toggleFamily(card));

    grid.appendChild(card);
  });
}

/* INIT */
render();
</script>

</body>
</html>
